services:
  postgres:
    image: postgres:16-alpine
    container_name: lighthouse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lighthouse
      POSTGRES_USER: lighthouse
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - lighthouse-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U lighthouse -d lighthouse" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  lighthouse-pg-data:
